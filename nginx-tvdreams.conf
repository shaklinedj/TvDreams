# nginx-tvdreams.conf
# Configuración de Nginx como reverse proxy para TvDreams
# Ubicación: /etc/nginx/sites-available/tvdreams
# Luego: sudo ln -s /etc/nginx/sites-available/tvdreams /etc/nginx/sites-enabled/

# Redirigir HTTP a HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name tvdreams.ejemplo.com *.tvdreams.ejemplo.com;
    
    # Permitir Certbot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    # Redirigir todo a HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS - Producción
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name tvdreams.ejemplo.com *.tvdreams.ejemplo.com;
    
    # =====================================
    # SSL/TLS Configuration
    # =====================================
    ssl_certificate /etc/letsencrypt/live/tvdreams.ejemplo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tvdreams.ejemplo.com/privkey.pem;
    
    # Modern configuration - Intermediate SSL (NGINX)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!eNULL:!EXPORT:!DES:!RC4:!MD5:!PSK:!SRP:!CAMELLIA;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;
    
    # HSTS (HTTP Strict Transport Security)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    
    # =====================================
    # Security Headers
    # =====================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;
    
    # =====================================
    # Logging
    # =====================================
    access_log /var/log/nginx/tvdreams_access.log combined;
    error_log /var/log/nginx/tvdreams_error.log warn;
    
    # =====================================
    # Body size limit
    # =====================================
    client_max_body_size 500M;
    
    # =====================================
    # Rate limiting (opcional)
    # =====================================
    # Descomentar y configurar si necesitas limitar rate
    # limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    # limit_req_zone $binary_remote_addr zone=general_limit:10m rate=30r/s;
    
    # =====================================
    # Proxy configuration
    # =====================================
    location / {
        # Rate limiting (optional)
        # limit_req zone=general_limit burst=50 nodelay;
        
        proxy_pass http://localhost:3001;
        
        # HTTP version
        proxy_http_version 1.1;
        
        # Headers esenciales
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
        
        # Connection
        proxy_set_header Connection "";
        proxy_http_version 1.1;
    }
    
    # =====================================
    # WebSocket específico
    # =====================================
    location /ws {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket timeouts
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
    
    # =====================================
    # Cache estático (uploads, assets)
    # =====================================
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|eot|otf|ttf|woff|woff2)$ {
        proxy_pass http://localhost:3001;
        
        # Cache headers
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        
        access_log off;
    }
    
    # =====================================
    # Deny access to sensitive files
    # =====================================
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}
